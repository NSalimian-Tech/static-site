<!DOCTYPE html>
<html>
<head>
    <title>Najme's First Static Site</title>
    <style>
     
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .container {
            background: white;
            max-width: 600px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #2c3e50; }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #3498db;
            margin-bottom: 20px;
        }
        .links { margin-top: 30px; }
        .btn {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://via.placeholder.com/150" alt="Profile Picture" class="profile-img">
        
        <h1>Welcome to My Static Site</h1>
        <p>Hi! I'm <strong>Najme</strong>, an IT Engineer and a student in y44k0v's web development class.</p>
        
        <p>This is my first practice building a structured webpage using HTML and CSS internal styling.</p>

        <div class="links">
            <p>Check out my other projects:</p>
            <a href="https://nsalimian-tech.github.io/space.html/index.html" class="btn">🚀 Space Mission Project</a>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Static Site</title>
    <style>
     
        .highlight {
            color: blue; 
            border: 2px solid red; 
            padding: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h1 id="text-to-change">Hello! I am unchanged.</h1>
    
    <button onclick="changeEverything()">Click me!</button>

    <script>
        function changeEverything() {
            var element = document.getElementById("text-to-change");
            
            element.innerHTML = "You clicked! I have been changed by JavaScript!";
            
            element.className = "highlight";
        }
    </script>

</body>
</html>

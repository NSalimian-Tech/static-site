<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Najme's Static Site</title>
    <style>
        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.5s ease; /* برای نرم عوض شدن رنگ */
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #eee;
        }
        h1 { margin: 10px 0; font-family: sans-serif; }
        p { color: #777; margin-bottom: 20px; }
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            text-decoration: none;
            color: #333;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            display: block;
        }
        .btn:hover { background-color: #f9f9f9; }
        
        /* دکمه جادویی تغییر رنگ */
        #colorBtn {
            margin-top: 15px;
            background-color: #333;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
        }
    </style>
</head>
<body id="body-bg">

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="Najme" class="profile-img">
        <h1>Najme Salimian</h1>
        <p>IT Engineer | ComIT Student</p>

        <div class="button-container">
            <a href="https://github.com/NSalimian-Tech" class="btn">GitHub</a>
            <a href="https://www.linkedin.com/in/seyede-najme-salimian-a35a241a3/" class="btn">LinkedIn</a>
            <button id="colorBtn">Change Theme Color</button>
        </div>
    </div>

    <script>
        // این دقیقاً همون منطقی هست که توی سایت aihejirika هست
        const btn = document.getElementById('colorBtn');
        const body = document.getElementById('body-bg');

        btn.addEventListener('click', () => {
            // رنگ رو به یک رنگ تصادفی یا یک رنگ خاص عوض می‌کنه
            const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
            body.style.backgroundColor = randomColor;
        });
    </script>
</body>
</html>
